name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aims
          POSTGRES_PASSWORD: aims
          POSTGRES_DB: aims
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install API deps
        run: pip install -r apps/api/requirements.txt
      - name: Smoke test API
        env:
          DATABASE_URL: postgresql://aims:aims@localhost:5432/aims
          SCHEMAS_DIR: ${{ github.workspace }}/schemas
        working-directory: apps/api
        run: |
          python -c "from app.main import app; print('app ok')"
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          sleep 3
          curl -sf http://127.0.0.1:8000/health
          curl -sf http://127.0.0.1:8000/api/v1/securities | head -c 200
          curl -sf http://127.0.0.1:8000/api/v1/events | head -c 200
          curl -sf http://127.0.0.1:8000/api/v1/research | head -c 200

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd apps/web && npm install && npm run build
        env:
          API_URL: http://localhost:8000
