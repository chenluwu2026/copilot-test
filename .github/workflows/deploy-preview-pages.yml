name: Deploy mobile preview to GitHub Pages

on:
  push:
    branches: [main, cursor/aims-phase1-mvp-a5cb]
    paths:
      - "docs/**"
      - "preview/**"
      - ".github/workflows/deploy-preview-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Prepare docs
        run: |
          mkdir -p docs
          cp preview/aims-preview.html docs/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
