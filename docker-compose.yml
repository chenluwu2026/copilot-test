services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aims
      POSTGRES_PASSWORD: aims
      POSTGRES_DB: aims
    ports:
      - "5432:5432"
    volumes:
      - aims_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aims -d aims"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  aims_pg:
