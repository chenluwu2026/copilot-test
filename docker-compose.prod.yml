# 一键线上体验（个人自用推荐）
# 用法: docker compose -f docker-compose.prod.yml up -d --build
# 浏览器打开 http://localhost:8080

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aims
      POSTGRES_PASSWORD: aims
      POSTGRES_DB: aims
    volumes:
      - aims_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aims -d aims"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql://aims:aims@db:5432/aims
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      SCHEMAS_DIR: /schemas
      RUN_SEED: ${RUN_SEED:-true}
      AUTO_NAV_AFTER_SYNC: ${AUTO_NAV_AFTER_SYNC:-true}
      AUTO_DAILY_REPORT_AFTER_SYNC: ${AUTO_DAILY_REPORT_AFTER_SYNC:-false}
      DATA_SYNC_CRON_ENABLED: ${DATA_SYNC_CRON_ENABLED:-false}
      REBALANCE_CRON_ENABLED: ${REBALANCE_CRON_ENABLED:-false}
      AGENT_MODE: ${AGENT_MODE:-rule}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      CIO_DECISION_MODE: ${CIO_DECISION_MODE:-batch}
      CIO_REFRESH_RESEARCH: ${CIO_REFRESH_RESEARCH:-false}
      CIO_MAX_SYMBOLS: ${CIO_MAX_SYMBOLS:-12}
      REBALANCE_CRON_CHAIN_AFTER_SYNC: ${REBALANCE_CRON_CHAIN_AFTER_SYNC:-false}
      DAILY_REPORT_CRON_ENABLED: ${DAILY_REPORT_CRON_ENABLED:-false}
      EVENT_RESEARCH_REFRESH_ENABLED: ${EVENT_RESEARCH_REFRESH_ENABLED:-true}
      DATA_PROVIDER: ${DATA_PROVIDER:-akshare}
      API_KEY: ${API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}
      REVIEW_CRON_ENABLED: ${REVIEW_CRON_ENABLED:-false}
      REVIEW_CRON_TIME: ${REVIEW_CRON_TIME:-20:00}
      NEWS_SYNC_CRON_ENABLED: ${NEWS_SYNC_CRON_ENABLED:-false}
      NEWS_SYNC_CRON_TIME: ${NEWS_SYNC_CRON_TIME:-09:00}
      NEWS_SYNC_MAX_SYMBOLS: ${NEWS_SYNC_MAX_SYMBOLS:-8}
      ALEMBIC_UPGRADE_ON_START: ${ALEMBIC_UPGRADE_ON_START:-true}
      # API_KEY: "your-secret"  # 启用后前端需设 NEXT_PUBLIC_API_KEY（见 DEPLOY.md）
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ""
    environment:
      PORT: "3000"
      # SSR 走容器内网访问 API（与浏览器同源走 Caddy 时留空）
      API_URL: http://api:8000
    depends_on:
      - api
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - api
      - web
    restart: unless-stopped

volumes:
  aims_pg:
